<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Aprendendo FETCH</h1>
    <button onclick="cadastrarUsuarios()">Cadastrar</button>
    <button onclick="renderizarUsuarios()">Renderizar</button>

    <br> <br>   

    <input type="text" id="nome" placeholder="Digite seu nome">
    <input type="text" id="email" placeholder="Digite sua email">
    <input type="text" id="senha" placeholder="Digite sua senha">
    
    <br><br>

    <div id="listar-usuarios"></div>

    <script>
        async function buscarUsuarios () {
            const usuarios = await fetch('http://localhost:3000/usuarios');
            const resultado = await usuarios.json();
            console.log(resultado);
            return (resultado);
        }
            
        async function renderizarUsuarios() {
            const usuarios = await buscarUsuarios();
            const div = document.getElementById('listar-usuarios')

            usuarios.forEach(usuario => {
                const card = document.createElement("div");
                card.style.border = '1px solid #ccc'
                card.innerHTML = `<h1>${usuario.nome}</h1>`
                div.appendChild(card)
            });
        }

        renderizarUsuarios();

        async function cadastrarUsuarios() {
            const nome = document.getElementById("nome").value;
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;
            
            if (!nome || !senha || !email){
                alert("Preencha todas as informações!")
                return
            }

            await fetch('http://localhost:3000/usuarios', {
                method: "POST",
                body: JSON.stringify({nome, email, senha}),
                headers: {'Content-Type': "application/json"} 
            })
        }
        </script>
   
</body>
</html>
